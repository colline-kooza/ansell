version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: ansell_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - PORT=8080
      - DATABASE_URL=host=postgres user=postgres password=postgres dbname=ansell_db port=5432 sslmode=disable TimeZone=UTC
      - JWT_SECRET=dev-jwt-secret-please-change-in-production-32chars
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-your-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      - GOOGLE_CALLBACK_URL=http://localhost:8080/api/v1/auth/google/callback
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ansell_network

  postgres:
    image: postgres:16-alpine
    container_name: ansell_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ansell_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ansell_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ansell_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ansell_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ansell_network

volumes:
  postgres_data:
  go-modules:

networks:
  ansell_network:
    driver: bridge
