services:
  # ─── Go API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: ansell-api
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ansell_network

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: ansell-web
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - ansell_network

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ansell-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ansell_network

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: ansell-nginx
    restart: unless-stopped
    # ports:
    #   - "80:80"
    #   - "443:443"
    expose:
      - "80"
      - "443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - ansell_network

volumes:
  postgres_data:

networks:
  ansell_network:
    driver: bridge
